<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>极聊 - 轻量级即时通讯</title>
  <meta name="description" content="极聊是一款基于 PHP + WebSocket 的即时通讯系统，支持群聊、私聊、文件传输、管理后台等完整功能。" />
  <link rel="stylesheet" href="/assets/css/app.css" />
  <style>
    #home-init-loader {
      position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
      background:var(--bg-primary);z-index:9999;flex-direction:column;gap:1rem;
    }
    #home-init-loader .spinner{width:36px;height:36px;}
    #home-root{min-height:100vh;}

    /* ═══════════════ 主题：默认 ═══════════════ */
    .t-default .hero-gradient {
      background: linear-gradient(160deg,
        rgba(79,115,248,.15) 0%,
        rgba(79,115,248,.04) 40%,
        transparent 70%);
    }
    .t-default .gradient-text {
      background:linear-gradient(135deg,var(--primary),#a78bfa);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .t-default .hero-screenshot {
      max-width: 780px; width: 100%;
      border-radius: var(--radius-lg); box-shadow: 0 24px 80px rgba(79,115,248,.25);
      border: 1px solid var(--border); background: var(--bg-card);
      overflow: hidden;
    }
    .t-default .mock-chat-preview{padding:1rem;display:flex;flex-direction:column;gap:.5rem;}
    .t-default .mock-bar{height:36px;background:var(--bg-secondary);border-radius:var(--radius-sm);margin-bottom:.5rem;display:flex;align-items:center;padding:0 .75rem;gap:.5rem;}
    .t-default .mock-dot{width:10px;height:10px;border-radius:50%;background:var(--border);}
    .t-default .mock-dot.r{background:#f87171;}.t-default .mock-dot.y{background:#fbbf24;}.t-default .mock-dot.g{background:#34d399;}
    .t-default .mock-msg{display:flex;gap:.5rem;}.t-default .mock-msg.right{flex-direction:row-reverse;}
    .t-default .mock-avatar{width:28px;height:28px;border-radius:50%;background:var(--primary);flex-shrink:0;}
    .t-default .mock-bubble{padding:.4rem .75rem;border-radius:12px;font-size:.82rem;max-width:60%;background:var(--bg-secondary);color:var(--text-primary);}
    .t-default .mock-msg.right .mock-bubble{background:var(--primary);color:#fff;}
    .t-default .stat-row{display:flex;gap:3rem;flex-wrap:wrap;justify-content:center;}
    .t-default .stat-item{text-align:center;}
    .t-default .stat-num{font-size:2.5rem;font-weight:800;color:var(--primary);line-height:1;}
    .t-default .stat-lbl{font-size:.875rem;color:var(--text-muted);margin-top:.3rem;}
    .t-default .tech-stack{display:flex;gap:.625rem;flex-wrap:wrap;justify-content:center;margin-top:1.5rem;}
    .t-default .tech-tag{padding:.35rem .875rem;border-radius:var(--radius-full);background:var(--bg-input);border:1px solid var(--border);font-size:.8rem;font-weight:600;color:var(--text-secondary);}
    .t-default .cta-section{text-align:center;padding:6rem 2rem;background:linear-gradient(135deg,var(--primary) 0%,#7c3aed 100%);color:#fff;}
    .t-default .cta-section .section-title{color:#fff;}
    .t-default .cta-section p{color:rgba(255,255,255,.8);font-size:1.05rem;margin-top:.75rem;}
    .t-default .cta-section .btn-ghost{border-color:rgba(255,255,255,.4);color:#fff;}
    .t-default .cta-section .btn-ghost:hover{background:rgba(255,255,255,.15);border-color:white;}

    /* ═══════════════ 主题：科技 ═══════════════ */
    .t-tech{background:#020b18;color:#c9d6e3;font-family:'JetBrains Mono','Fira Code','Courier New',monospace,sans-serif;}
    .t-tech *{box-sizing:border-box;}
    .t-tech .tech-grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;background:linear-gradient(rgba(0,246,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,246,255,.04) 1px,transparent 1px);background-size:48px 48px;}
    .t-tech .tech-glow{position:fixed;top:-20%;left:50%;transform:translateX(-50%);width:80vw;height:60vh;border-radius:50%;background:radial-gradient(ellipse,rgba(0,246,255,.08) 0%,transparent 70%);pointer-events:none;z-index:0;}
    .t-tech .tech-section{position:relative;z-index:1;}
    .t-tech .tech-navbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:.9rem 2.5rem;border-bottom:1px solid rgba(0,246,255,.12);background:rgba(2,11,24,.85);backdrop-filter:blur(12px);}
    .t-tech .tech-logo{font-size:1.2rem;font-weight:700;letter-spacing:.12em;color:#00f6ff;text-shadow:0 0 16px rgba(0,246,255,.6);}
    .t-tech .tech-nav-links{display:flex;gap:2rem;}
    .t-tech .tech-nav-links a{color:rgba(201,214,227,.7);text-decoration:none;font-size:.85rem;letter-spacing:.06em;transition:color .2s;}
    .t-tech .tech-nav-links a:hover{color:#00f6ff;}
    .t-tech .tech-btn{display:inline-block;padding:.6rem 1.4rem;border-radius:4px;cursor:pointer;font-size:.85rem;font-weight:600;letter-spacing:.08em;text-decoration:none;transition:.2s;border:none;}
    .t-tech .tech-btn-outline{border:1px solid rgba(0,246,255,.4);color:#00f6ff;background:transparent;}
    .t-tech .tech-btn-outline:hover{background:rgba(0,246,255,.08);}
    .t-tech .tech-btn-primary{background:linear-gradient(135deg,#00f6ff,#0070ff);color:#020b18;box-shadow:0 0 20px rgba(0,246,255,.35);}
    .t-tech .tech-btn-primary:hover{transform:translateY(-1px);box-shadow:0 0 28px rgba(0,246,255,.5);}
    .t-tech .tech-hero{min-height:92vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:4rem 2rem;gap:1.5rem;}
    .t-tech .tech-badge{display:inline-block;padding:.3rem .9rem;border:1px solid rgba(0,246,255,.3);border-radius:2px;font-size:.75rem;letter-spacing:.12em;color:#00f6ff;background:rgba(0,246,255,.06);}
    .t-tech .tech-hero-title{font-size:clamp(2.4rem,6vw,4.5rem);font-weight:800;line-height:1.1;letter-spacing:-.01em;color:#fff;text-shadow:0 0 60px rgba(0,246,255,.2);margin:0;}
    .t-tech .tech-neon{color:#00f6ff;text-shadow:0 0 20px rgba(0,246,255,.8);}
    .t-tech .tech-hero-sub{max-width:600px;font-size:1rem;line-height:1.7;color:rgba(201,214,227,.65);}
    .t-tech .tech-btns{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;}
    .t-tech .tech-terminal{width:100%;max-width:720px;background:rgba(0,0,0,.6);border:1px solid rgba(0,246,255,.2);border-radius:6px;overflow:hidden;box-shadow:0 0 40px rgba(0,246,255,.1);}
    .t-tech .terminal-bar{background:rgba(0,246,255,.06);padding:.5rem .75rem;display:flex;align-items:center;gap:.45rem;border-bottom:1px solid rgba(0,246,255,.12);}
    .t-tech .terminal-dot{width:10px;height:10px;border-radius:50%;}
    .t-tech .terminal-body{padding:1.25rem 1.5rem;font-size:.8rem;line-height:1.8;color:#7fffd4;}
    .t-tech .terminal-line{display:flex;gap:.6rem;}
    .t-tech .t-prompt{color:#00f6ff;opacity:.7;}.t-tech .t-cmd{color:#fff;}
    .t-tech .t-out{color:rgba(127,255,212,.75);margin-left:1.5rem;display:block;}
    .t-tech .t-cursor{display:inline-block;width:8px;height:1em;background:#00f6ff;animation:blink .8s step-end infinite;}
    @keyframes blink{50%{opacity:0}}
    .t-tech .tech-features-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1px;border:1px solid rgba(0,246,255,.1);background:rgba(0,246,255,.1);overflow:hidden;border-radius:6px;}
    .t-tech .tech-feat-card{background:#020b18;padding:1.75rem;transition:.2s;}
    .t-tech .tech-feat-card:hover{background:rgba(0,246,255,.04);}
    .t-tech .tech-feat-icon{width:40px;height:40px;margin-bottom:.75rem;display:flex;align-items:center;justify-content:center;border:1px solid rgba(0,246,255,.25);border-radius:4px;font-size:1.25rem;background:rgba(0,246,255,.05);}
    .t-tech .tech-feat-title{font-size:.9rem;font-weight:600;color:#e2eaf4;margin-bottom:.4rem;}
    .t-tech .tech-feat-desc{font-size:.8rem;color:rgba(201,214,227,.5);line-height:1.6;font-family:sans-serif;}
    .t-tech .tech-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1px;background:rgba(0,246,255,.1);border:1px solid rgba(0,246,255,.1);border-radius:6px;overflow:hidden;}
    .t-tech .tech-stat{background:#020b18;padding:1.5rem;text-align:center;}
    .t-tech .tech-stat-num{font-size:2.2rem;font-weight:800;color:#00f6ff;line-height:1;}
    .t-tech .tech-stat-lbl{font-size:.75rem;color:rgba(201,214,227,.5);margin-top:.35rem;letter-spacing:.06em;font-family:sans-serif;}
    .t-tech .tech-cta{text-align:center;padding:5rem 2rem;background:linear-gradient(135deg,rgba(0,246,255,.06),rgba(0,112,255,.08));border-top:1px solid rgba(0,246,255,.15);}
    .t-tech .tech-cta-title{font-size:2rem;font-weight:800;color:#fff;margin-bottom:.75rem;}
    .t-tech .tech-footer{border-top:1px solid rgba(0,246,255,.1);padding:1.5rem 2rem;text-align:center;font-size:.78rem;color:rgba(201,214,227,.35);}
    .t-tech .tech-section-label{font-size:.72rem;letter-spacing:.16em;color:#00f6ff;opacity:.75;text-transform:uppercase;margin-bottom:.5rem;}
    .t-tech .tech-section-title{font-size:clamp(1.5rem,3vw,2.2rem);font-weight:700;color:#e2eaf4;margin-bottom:1rem;}
    .t-tech .section-wrap{max-width:1100px;margin:0 auto;padding:5rem 2rem;}
    @media(max-width:640px){.t-tech .tech-navbar{padding:.75rem 1rem;}.t-tech .tech-nav-links{display:none;}}

    /* ═══════════════ 主题：极简 ═══════════════ */
    .t-minimal{background:#fff;color:#111;font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;}
    [data-theme="dark"] .t-minimal{background:#0a0a0a;color:#f0f0f0;}
    .t-minimal .min-navbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1.25rem 3rem;border-bottom:1px solid #e8e8e8;background:#fff;}
    [data-theme="dark"] .t-minimal .min-navbar{background:#0a0a0a;border-color:#1a1a1a;}
    .t-minimal .min-logo{font-size:1.1rem;font-weight:800;letter-spacing:-.02em;color:#111;}
    [data-theme="dark"] .t-minimal .min-logo{color:#f0f0f0;}
    .t-minimal .min-nav-links{display:flex;gap:2.5rem;}
    .t-minimal .min-nav-links a{color:#666;text-decoration:none;font-size:.9rem;transition:color .15s;}
    .t-minimal .min-nav-links a:hover{color:#111;}
    [data-theme="dark"] .t-minimal .min-nav-links a{color:#888;}
    [data-theme="dark"] .t-minimal .min-nav-links a:hover{color:#f0f0f0;}
    .t-minimal .min-btn{display:inline-block;padding:.55rem 1.3rem;font-size:.875rem;font-weight:600;text-decoration:none;border-radius:6px;cursor:pointer;transition:.15s;}
    .t-minimal .min-btn-outline{border:1.5px solid #ddd;color:#444;background:transparent;}
    .t-minimal .min-btn-outline:hover{border-color:#111;color:#111;}
    .t-minimal .min-btn-dark{background:#111;color:#fff;border:none;}
    .t-minimal .min-btn-dark:hover{background:#333;}
    [data-theme="dark"] .t-minimal .min-btn-dark{background:#f0f0f0;color:#111;}
    [data-theme="dark"] .t-minimal .min-btn-dark:hover{background:#ddd;}
    .t-minimal .min-hero{max-width:900px;margin:0 auto;padding:9rem 3rem 7rem;}
    .t-minimal .min-eyebrow{display:inline-block;font-size:.78rem;font-weight:700;letter-spacing:.14em;color:#999;text-transform:uppercase;margin-bottom:1.5rem;}
    .t-minimal .min-title{font-size:clamp(3rem,8vw,6rem);font-weight:900;line-height:1.0;letter-spacing:-.04em;color:#111;margin:0 0 1.5rem;}
    [data-theme="dark"] .t-minimal .min-title{color:#f0f0f0;}
    .t-minimal .min-title em{font-style:normal;border-bottom:4px solid #111;}
    [data-theme="dark"] .t-minimal .min-title em{border-color:#f0f0f0;}
    .t-minimal .min-sub{font-size:1.15rem;color:#666;line-height:1.75;max-width:600px;margin-bottom:2.5rem;}
    [data-theme="dark"] .t-minimal .min-sub{color:#999;}
    .t-minimal .min-btns{display:flex;gap:1rem;flex-wrap:wrap;}
    .t-minimal .min-divider{max-width:960px;margin:0 auto;height:1px;background:#e8e8e8;}
    [data-theme="dark"] .t-minimal .min-divider{background:#1a1a1a;}
    .t-minimal .min-features{max-width:960px;margin:0 auto;padding:5rem 3rem;}
    .t-minimal .min-feat-label{font-size:.75rem;font-weight:700;letter-spacing:.14em;color:#999;text-transform:uppercase;margin-bottom:1rem;}
    .t-minimal .min-feat-title{font-size:2rem;font-weight:900;letter-spacing:-.03em;color:#111;margin-bottom:3rem;}
    [data-theme="dark"] .t-minimal .min-feat-title{color:#f0f0f0;}
    .t-minimal .min-feat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:2.5rem 3rem;}
    .t-minimal .min-feat-num{font-size:.75rem;font-weight:800;letter-spacing:.1em;color:#bbb;margin-bottom:.5rem;}
    .t-minimal .min-feat-name{font-size:1rem;font-weight:700;color:#111;margin-bottom:.4rem;}
    [data-theme="dark"] .t-minimal .min-feat-name{color:#eee;}
    .t-minimal .min-feat-desc{font-size:.875rem;color:#777;line-height:1.65;}
    [data-theme="dark"] .t-minimal .min-feat-desc{color:#888;}
    .t-minimal .min-cta{max-width:960px;margin:0 auto;padding:6rem 3rem;border-top:1px solid #e8e8e8;}
    [data-theme="dark"] .t-minimal .min-cta{border-color:#1a1a1a;}
    .t-minimal .min-cta-title{font-size:clamp(2rem,5vw,3.5rem);font-weight:900;letter-spacing:-.04em;color:#111;margin-bottom:1.25rem;}
    [data-theme="dark"] .t-minimal .min-cta-title{color:#f0f0f0;}
    .t-minimal .min-footer{border-top:1px solid #e8e8e8;padding:1.5rem 3rem;display:flex;align-items:center;justify-content:space-between;font-size:.82rem;color:#999;flex-wrap:wrap;gap:.5rem;}
    [data-theme="dark"] .t-minimal .min-footer{border-color:#1a1a1a;background:#0a0a0a;}
    .t-minimal .min-footer a{color:#666;text-decoration:none;}
    [data-theme="dark"] .t-minimal .min-footer a{color:#888;}
    @media(max-width:640px){.t-minimal .min-navbar{padding:.9rem 1.25rem;}.t-minimal .min-nav-links{display:none;}.t-minimal .min-hero,.t-minimal .min-features,.t-minimal .min-cta{padding-left:1.25rem;padding-right:1.25rem;}.t-minimal .min-title{font-size:3rem;}}

    /* ═══════════════ 主题：极光 ═══════════════ */
    .t-aurora{background:#050008;color:#e0d6f5;font-family:-apple-system,'Inter',sans-serif;}
    .t-aurora .aurora-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
    .t-aurora .aurora-layer{position:absolute;border-radius:50%;filter:blur(80px);opacity:.55;animation:floatAurora 12s ease-in-out infinite;}
    .t-aurora .aur-1{width:70vw;height:50vh;left:-10%;top:-5%;background:radial-gradient(ellipse,#7b2fff,transparent 70%);animation-duration:14s;}
    .t-aurora .aur-2{width:60vw;height:45vh;right:-10%;top:10%;background:radial-gradient(ellipse,#00d2ff,transparent 70%);animation-duration:10s;animation-delay:-3s;}
    .t-aurora .aur-3{width:55vw;height:55vh;left:20%;top:30%;background:radial-gradient(ellipse,#ff2eb3,transparent 70%);animation-duration:16s;animation-delay:-7s;opacity:.3;}
    .t-aurora .aur-4{width:40vw;height:40vh;right:10%;bottom:10%;background:radial-gradient(ellipse,#00ffb3,transparent 70%);animation-duration:11s;animation-delay:-2s;opacity:.35;}
    @keyframes floatAurora{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-6%) scale(1.05);}}
    .t-aurora .aur-section{position:relative;z-index:1;}
    .t-aurora .aur-navbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1rem 2.5rem;border-bottom:1px solid rgba(255,255,255,.08);background:rgba(5,0,8,.7);backdrop-filter:blur(16px);}
    .t-aurora .aur-logo{font-size:1.2rem;font-weight:800;letter-spacing:.05em;background:linear-gradient(90deg,#a855f7,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .t-aurora .aur-nav-links{display:flex;gap:2rem;}
    .t-aurora .aur-nav-links a{color:rgba(224,214,245,.6);text-decoration:none;font-size:.875rem;transition:color .2s;}
    .t-aurora .aur-nav-links a:hover{color:#e0d6f5;}
    .t-aurora .aur-btn{display:inline-block;padding:.6rem 1.5rem;border-radius:9999px;font-size:.875rem;font-weight:600;text-decoration:none;cursor:pointer;transition:.25s;border:none;}
    .t-aurora .aur-btn-ghost{border:1px solid rgba(255,255,255,.2);color:#e0d6f5;background:rgba(255,255,255,.05);}
    .t-aurora .aur-btn-ghost:hover{background:rgba(255,255,255,.1);}
    .t-aurora .aur-btn-primary{background:linear-gradient(135deg,#a855f7,#06b6d4);color:#fff;box-shadow:0 0 24px rgba(168,85,247,.4);}
    .t-aurora .aur-btn-primary:hover{transform:translateY(-2px);box-shadow:0 0 36px rgba(168,85,247,.6);}
    .t-aurora .aur-hero{min-height:90vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:4rem 2rem;gap:2rem;}
    .t-aurora .aur-badge{display:inline-flex;align-items:center;gap:.4rem;padding:.35rem 1rem;border-radius:9999px;border:1px solid rgba(168,85,247,.4);background:rgba(168,85,247,.1);font-size:.8rem;color:rgba(224,214,245,.8);}
    .t-aurora .aur-title{font-size:clamp(2.8rem,7vw,5.5rem);font-weight:900;line-height:1.08;letter-spacing:-.03em;color:#fff;margin:0;}
    .t-aurora .aur-gradient-text{background:linear-gradient(90deg,#a855f7 0%,#06b6d4 50%,#a855f7 100%);background-size:200% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 4s linear infinite;}
    @keyframes shimmer{to{background-position:200% 0}}
    .t-aurora .aur-sub{max-width:580px;font-size:1.05rem;line-height:1.75;color:rgba(224,214,245,.6);}
    .t-aurora .aur-btns{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;}
    .t-aurora .aur-card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.25rem;}
    .t-aurora .aur-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:1.5rem;backdrop-filter:blur(12px);transition:.25s;}
    .t-aurora .aur-card:hover{background:rgba(255,255,255,.07);transform:translateY(-2px);}
    .t-aurora .aur-card-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin-bottom:.875rem;background:linear-gradient(135deg,rgba(168,85,247,.3),rgba(6,182,212,.2));}
    .t-aurora .aur-card-title{font-size:.95rem;font-weight:700;color:#e0d6f5;margin-bottom:.4rem;}
    .t-aurora .aur-card-desc{font-size:.82rem;color:rgba(224,214,245,.5);line-height:1.65;}
    .t-aurora .aur-stats{display:flex;gap:2rem;flex-wrap:wrap;justify-content:center;}
    .t-aurora .aur-stat-item{text-align:center;}
    .t-aurora .aur-stat-num{font-size:2.5rem;font-weight:800;line-height:1;background:linear-gradient(135deg,#a855f7,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .t-aurora .aur-stat-lbl{font-size:.82rem;color:rgba(224,214,245,.5);margin-top:.4rem;}
    .t-aurora .aur-cta{text-align:center;padding:6rem 2rem;background:linear-gradient(135deg,rgba(168,85,247,.12),rgba(6,182,212,.08));border-top:1px solid rgba(255,255,255,.06);border-bottom:1px solid rgba(255,255,255,.06);}
    .t-aurora .aur-cta-title{font-size:2.2rem;font-weight:800;color:#fff;margin-bottom:.75rem;}
    .t-aurora .aur-cta-sub{color:rgba(224,214,245,.6);font-size:1rem;margin-bottom:2rem;}
    .t-aurora .aur-footer{padding:1.75rem 2.5rem;text-align:center;font-size:.8rem;color:rgba(224,214,245,.3);border-top:1px solid rgba(255,255,255,.06);}
    .t-aurora .aur-section-wrap{max-width:1100px;margin:0 auto;padding:5rem 2rem;}
    .t-aurora .aur-section-label{display:inline-block;font-size:.75rem;font-weight:700;letter-spacing:.12em;color:#a855f7;text-transform:uppercase;margin-bottom:.5rem;}
    .t-aurora .aur-section-title{font-size:clamp(1.6rem,3vw,2.5rem);font-weight:800;color:#fff;margin-bottom:1rem;}
    @media(max-width:640px){.t-aurora .aur-navbar{padding:.75rem 1.25rem;}.t-aurora .aur-nav-links{display:none;}}

   ════════════════════════════════════════════════════════ */
(async function() {
  let cfg = {};
  try {
    const res = await api('settings/public', {}, 'GET');
    if (res.code === 0 && res.data) cfg = res.data;
  } catch(e) {}

  const themeName = cfg.index_theme || 'default';
  const theme = HOME_THEMES[themeName] || HOME_THEMES.default;

  const root = document.getElementById('home-root');
  root.innerHTML = theme.render(cfg);

  const loader = document.getElementById('home-init-loader');
  if (loader) loader.remove();
  root.style.opacity = '1';

  theme.init();

  // 主题切换按钮
  document.querySelectorAll('.js-theme-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
    });
  });

  // 恢复保存的 data-theme
  const saved = localStorage.getItem('theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
})();
</script>
</body>
</html>
